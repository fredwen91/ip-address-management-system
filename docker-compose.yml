services:
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./gateway-service:/var/www
    depends_on:
      - auth-service
      - ip-management-service
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - IP_MANAGEMENT_SERVICE_URL=http://ip-management-service:8002
    networks:
      - app-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./auth-service:/var/www
    depends_on:
      - auth-db
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=auth-db
      - DB_PORT=3306
      - DB_DATABASE=auth_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    networks:
      - app-network

  ip-management-service:
    build:
      context: ./ip-management-service
      dockerfile: Dockerfile
    container_name: ip-management-service
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./ip-management-service:/var/www
    depends_on:
      - ip-management-db
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=ip-management-db
      - DB_PORT=3306
      - DB_DATABASE=ip_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway-service
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network

  auth-db:
    image: mysql:8
    container_name: auth-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - app-network

  ip-management-db:
    image: mysql:8
    container_name: ip-management-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ip_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - ip-management-db-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  auth-db-data:
  ip-management-db-data:

networks:
  app-network:
    driver: bridge
